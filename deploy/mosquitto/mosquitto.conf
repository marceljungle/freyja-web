# Freyja Mosquitto broker configuration.
#
# Development default: anonymous access on plain MQTT (1883) and WebSockets (9001).
# For production, disable anonymous access and enable a password file (see below).

persistence true
persistence_location /mosquitto/data/

listener 1883
protocol mqtt

listener 9001
protocol websockets

# --- Development: allow anonymous clients --------------------------------------
allow_anonymous true

# --- Production hardening (uncomment and provide a password file) --------------
# allow_anonymous false
# password_file /mosquitto/config/passwd
# Create with: mosquitto_passwd -c /mosquitto/config/passwd freyja

log_dest stdout
log_type warning
log_type notice
log_type information
