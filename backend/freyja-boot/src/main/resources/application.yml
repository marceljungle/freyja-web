server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: freyja-backend
  datasource:
    url: ${FREYJA_DB_URL:jdbc:postgresql://localhost:5432/freyja}
    username: ${FREYJA_DB_USER:freyja}
    password: ${FREYJA_DB_PASSWORD:freyja}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

freyja:
  security:
    jwt:
      # Override in production via FREYJA_JWT_SECRET (Base64, >= 256 bits).
      secret: ${FREYJA_JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tZnJleWphLXN1cGVyLXNlY3JldC1rZXktMzJi}
      issuer: freyja
      expiration-ms: ${FREYJA_JWT_EXPIRATION_MS:86400000}
  cors:
    # Comma-separated allowed origins (exact or patterns, e.g. "http://192.168.*:5173").
    # The 'dev' profile relaxes this to "*"; production should pin it via
    # FREYJA_CORS_ALLOWED_ORIGINS. See application-dev.yml / application-prod.yml.
    allowed-origins: ${FREYJA_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mqtt:
    enabled: ${FREYJA_MQTT_ENABLED:true}
    url: ${FREYJA_MQTT_URL:tcp://localhost:32050}
    client-id: ${FREYJA_MQTT_CLIENT_ID:freyja-backend}
    username: ${FREYJA_MQTT_USERNAME:}
    password: ${FREYJA_MQTT_PASSWORD:}
    telemetry-topic: ${FREYJA_MQTT_TELEMETRY_TOPIC:freyja/+/telemetry}
    command-topic-pattern: ${FREYJA_MQTT_COMMAND_TOPIC_PATTERN:freyja/%s/rx}
    qos: ${FREYJA_MQTT_QOS:1}
  opencellid:
    # Cell-tower location fallback. Leave the key blank to disable resolution.
    api-key: ${FREYJA_OPENCELLID_API_KEY:}
    base-url: ${FREYJA_OPENCELLID_BASE_URL:https://opencellid.org}
    timeout-ms: ${FREYJA_OPENCELLID_TIMEOUT_MS:3000}
  live-mode:
    # Keep-alive: how often to re-send live_on to enabled devices, refreshing the
    # firmware auto-off (FREYJA_LIVE_MAX_DURATION_SEC, 600s). Must be shorter than that.
    keepalive-ms: ${FREYJA_LIVE_MODE_KEEPALIVE_MS:300000}

logging:
  level:
    com.freyja: ${FREYJA_LOG_LEVEL:INFO}
    org.springframework.integration.mqtt: WARN
